<!DOCTYPE html>
<html>
    <head>
        <title>CORS URL Missing !!</title>
        <style>
            body {
                font-family: Verdana;
            }

            .url {
                color: #f00;
            }
        </style>
    </head>
    <body>
        <h1>Your request is missing the "url" parameter.</h1>
        <h2>Please specify the url parameter as below:</h2>
        <h3>
            https://cors.kcak11.workers.dev/?url=<span class="url">https://www.example.com</span>
        </h3>
        <span>        Note: In the url, don't forget to also include the protocol i.e. http:// or https://</span>
    </body>
</html>
